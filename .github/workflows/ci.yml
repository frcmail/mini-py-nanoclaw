name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install croniter==2.0.7 pytest==7.4.4 pytest-asyncio==0.23.8
      - name: Tests
        run: python -m pytest tests_py
